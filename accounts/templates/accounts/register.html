<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .register-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 18px;
            width: 380px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            text-align: center;
            transition: 0.3s;
        }

        .register-card:hover {
            transform: translateY(-3px);
        }

        /* TITLE */
        .title {
            font-size: 26px;
            font-weight: bold;
            color: #00e676;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
        }

        /* INPUT (Django form styling fix) */
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: #1e293b;
            color: white;
        }

        input:focus, select:focus {
            outline: 2px solid #00e676;
        }

        /* BUTTON */
        .btn {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00e676, #00c853);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            color: black;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* ERROR */
        .error {
            background: rgba(255,0,0,0.15);
            color: #ff6b6b;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* LINK */
        a {
            color: #00e676;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="register-card">

    <div class="title">Create Account</div>
    <div class="subtitle">Start your fitness journey 🚀</div>

    <!-- 🔴 FORM ERRORS -->
    {% if form.errors %}
        <div class="error">
            Please fix the errors below ❌
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn">Register</button>
    </form>

    <div style="margin-top: 15px;">
        <a href="{% url 'login' %}">Already have an account? Login</a>
    </div>

</div>

</body>
</html>
